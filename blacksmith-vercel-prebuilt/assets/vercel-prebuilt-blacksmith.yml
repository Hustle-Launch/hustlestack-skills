name: Deploy Vercel Prebuilt

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun tsc

      - name: Lint
        run: bun lint

      - name: Pull Vercel environment
        run: bunx --bun vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel output
        run: bunx --bun vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt output
        run: bunx --bun vercel deploy --prebuilt --prod --archive=tgz --token="$VERCEL_TOKEN"
