name: Preview Vercel Prebuilt

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: vercel-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
      pull-requests: write
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun tsc

      - name: Lint
        run: bun lint

      - name: Pull Vercel preview environment
        run: bunx --bun vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Vercel preview output
        run: bunx --bun vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview prebuilt output
        id: deploy
        run: |
          url="$(bunx --bun vercel deploy --prebuilt --archive=tgz --token="$VERCEL_TOKEN")"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "$url"

      - name: Comment preview URL
        uses: actions/github-script@v8
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}'
            if (!url) return
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Vercel preview: ${url}`,
            })
